name: Experiment headless MC client

on:
  push:
    branches: ["dev"]

env:
  # GHA ${{ env.HOME }} is empty unless set here; shell $HOME is /home/runner on ubuntu-latest.
  RUNNER_HOME: /home/runner
  JAVA_VERSION: "17"
  MC_VERSION: "1.20.1"
  # Vanilla asset index id (indexes/5.json), NOT the MC version string — see launch --assetIndex 5
  MC_ASSET_INDEX: "5"
  FORGE_BUILD: "47.4.13"
  HMC_VERSION: "2.9.0"
  MODPACK: Modpack-Modern
  FG_EXPORT_DIR: ${{ github.workspace }}/forge/build/guide-export
  FG_JVM_FLAGS: >-
    -Djava.awt.headless=false
    -Dmodernfix.config.mixin.feature.integrated_server_watchdog=false
    -Dfieldguide.runExportAndExit=true
    -Dfieldguide.exportMode=closure
    -Dfieldguide.exportWarmupTicks=2400
    -Dfieldguide.exportTimeoutSeconds=7200

jobs:
  modpack-dump:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Checkout Modpack-Modern at latest release tag
        id: modpack-release
        run: bash scripts/checkout-modpack-latest-release.sh

      - name: Log modpack version
        run: echo "Modpack-Modern @ ${{ steps.modpack-release.outputs.modpack_tag }}"

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Install xvfb + OpenGL + OpenAL Soft (null backend for CI)
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xvfb x11-xserver-utils \
            libgl1 libgl1-mesa-dri \
            libopenal1

      - name: Restore pakku-fetched mods
        id: pakku-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            Modpack-Modern/mods
            Modpack-Modern/resourcepacks
            Modpack-Modern/shaderpacks
          key: pakku-${{ hashFiles('Modpack-Modern/pakku-lock.json') }}
          restore-keys: |
            pakku-

      - name: Fetch modpack mods (cache miss only)
        if: steps.pakku-restore.outputs.cache-hit != 'true'
        working-directory: Modpack-Modern
        run: java -jar pakku.jar fetch

      - name: Save pakku-fetched mods (only on exact-key miss)
        if: steps.pakku-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            Modpack-Modern/mods
            Modpack-Modern/resourcepacks
            Modpack-Modern/shaderpacks
          key: ${{ steps.pakku-restore.outputs.cache-primary-key }}

      - name: Restore forge mod jar
        id: forge-mod-restore
        uses: actions/cache/restore@v4
        with:
          path: forge/build/libs
          key: forge-mod-${{ env.MC_VERSION }}-${{ env.FORGE_BUILD }}-${{ hashFiles('forge/src/**', 'forge/build.gradle', 'forge/config/**', 'gradle.properties', 'settings.gradle', 'build.gradle', 'gradle/wrapper/**') }}

      - name: Restore Gradle caches (MDG / Forge userdev / deps)
        id: gradle-restore
        if: steps.forge-mod-restore.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.RUNNER_HOME }}/.gradle/caches
            ${{ env.RUNNER_HOME }}/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ env.MC_VERSION }}-${{ env.FORGE_BUILD }}-${{ hashFiles('**/*.gradle', '**/*.gradle.kts', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-${{ env.MC_VERSION }}-${{ env.FORGE_BUILD }}-
            gradle-${{ runner.os }}-${{ env.MC_VERSION }}-
            gradle-${{ runner.os }}-

      - name: Build forge mod (cache miss only)
        if: steps.forge-mod-restore.outputs.cache-hit != 'true'
        run: chmod +x gradlew && ./gradlew :forge:reobfJar --no-daemon --parallel --build-cache

      - name: Save forge mod jar (only on exact-key miss)
        if: steps.forge-mod-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: forge/build/libs
          key: ${{ steps.forge-mod-restore.outputs.cache-primary-key }}

      - name: Save Gradle caches (only on exact-key miss)
        if: steps.forge-mod-restore.outputs.cache-hit != 'true' && steps.gradle-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ env.RUNNER_HOME }}/.gradle/caches
            ${{ env.RUNNER_HOME }}/.gradle/wrapper
          key: ${{ steps.gradle-restore.outputs.cache-primary-key }}

      - name: Restore HeadlessMC .minecraft
        id: hmc-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.RUNNER_HOME }}/.minecraft
          key: hmc-${{ env.MC_VERSION }}-forge-${{ env.FORGE_BUILD }}
          restore-keys: |
            hmc-${{ env.MC_VERSION }}-forge-
            hmc-${{ env.MC_VERSION }}-

      - name: Restore guide-export save (skip world create on hit)
        id: guide-save-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.MODPACK }}/saves/guide-export
          key: guide-export-${{ env.MC_VERSION }}-${{ hashFiles('Modpack-Modern/pakku-lock.json') }}
          restore-keys: |
            guide-export-${{ env.MC_VERSION }}-

      - name: Download HeadlessMC launcher
        uses: robinraju/release-downloader@v1.11
        with:
          repository: 3arthqu4ke/headlessmc
          tag: ${{ env.HMC_VERSION }}
          fileName: headlessmc-launcher-${{ env.HMC_VERSION }}.jar

      - name: Prepare modpack (forge jar, CraftPresence)
        run: |
          set -e
          mp="${{ env.MODPACK }}"
          mkdir -p "$mp/mods"
          find "$mp/mods" -maxdepth 1 -name 'field-guide-forge*.jar' -delete
          jar=$(ls forge/build/libs/field-guide-forge-*.jar | head -1)
          if [ -z "$jar" ]; then
            echo "::error::No field-guide-forge jar in forge/build/libs"
            exit 1
          fi
          cp -v "$jar" "$mp/mods/"

          cp="$mp/config/craftpresence.json"
          if [ -f "$cp" ]; then
            python3 - "$cp" <<'PY'
          import json, sys
          path = sys.argv[1]
          with open(path) as f:
              cfg = json.load(f)
          cfg.setdefault("displaySettings", {}).setdefault("presenceData", {})["enabled"] = False
          cfg.setdefault("advancedSettings", {})["maxConnectionAttempts"] = 1
          with open(path, "w") as f:
              json.dump(cfg, f, indent=2)
          print(f"Patched CraftPresence: {path}")
          PY
          fi

      - name: Setup HeadlessMC and install MC + Forge
        run: |
          set -e
          mkdir -p HeadlessMC
          cat > HeadlessMC/config.properties <<EOF
          hmc.java.versions=$JAVA_HOME/bin/java
          hmc.gamedir=$GITHUB_WORKSPACE/${{ env.MODPACK }}
          hmc.offline=true
          hmc.rethrow.launch.exceptions=true
          hmc.exit.on.failed.command=true
          EOF
          mc_ver="${{ env.MC_VERSION }}"
          forge="${{ env.FORGE_BUILD }}"
          if [ ! -f "$HOME/.minecraft/versions/$mc_ver/$mc_ver.json" ]; then
            java -jar "headlessmc-launcher-${{ env.HMC_VERSION }}.jar" --command "download $mc_ver"
          fi
          if ! ls "$HOME/.minecraft/versions" 2>/dev/null | grep -q "$forge"; then
            java -jar "headlessmc-launcher-${{ env.HMC_VERSION }}.jar" --command "forge $mc_ver --uid $forge"
          fi
          ls "$HOME/.minecraft/versions"

      - name: Launch modpack under xvfb, in-world export, then exit
        env:
          ALSOFT_DRIVERS: "null"
        run: |
          set -e
          mp="${{ env.MODPACK }}"
          mkdir -p "$mp/config" "$mp/saves" "${{ env.FG_EXPORT_DIR }}"
          cp -f forge/config/export-fml.toml "$mp/config/fml.toml"
          cp -f forge/config/export-forge-client.toml "$mp/config/forge-client.toml"
          cat > "$mp/options.txt" <<EOF
          onboardAccessibility:false
          pauseOnLostFocus:false
          EOF
          jvm="${{ env.FG_JVM_FLAGS }} -Dfieldguide.exportFolder=${{ env.FG_EXPORT_DIR }}"
          xvfb-run -a java \
            -Dhmc.check.xvfb=true \
            -jar "headlessmc-launcher-${{ env.HMC_VERSION }}.jar" \
            --command "launch .*forge.* -regex --jvm \"${jvm}\""

      - name: Probe Minecraft assets after launch
        id: mc-post
        if: success()
        run: |
          index="$HOME/.minecraft/assets/indexes/${{ env.MC_ASSET_INDEX }}.json"
          if [ -f "$index" ] && [ -d "$HOME/.minecraft/assets/objects" ]; then
            echo "assets_cache=ok" >> "$GITHUB_OUTPUT"
            du -sh "$HOME/.minecraft/assets" 2>/dev/null || true
          else
            echo "assets_cache=incomplete" >> "$GITHUB_OUTPUT"
            echo "::warning::expected $index and assets/objects/"
          fi

      - name: Save HeadlessMC .minecraft
        if: success() && steps.mc-post.outputs.assets_cache == 'ok' && steps.hmc-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.RUNNER_HOME }}/.minecraft
          key: ${{ steps.hmc-restore.outputs.cache-primary-key }}

      - name: Verify export output
        run: test -f forge/build/guide-export/manifest.json

      - name: Save guide-export world for next CI run
        if: success() && steps.guide-save-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.MODPACK }}/saves/guide-export
          key: ${{ steps.guide-save-restore.outputs.cache-primary-key }}

      - name: Upload guide export output
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: guide-export
          path: forge/build/guide-export/**
          if-no-files-found: error

      - name: Upload modpack launch logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: modpack-logs
          path: |
            Modpack-Modern/logs/**
            Modpack-Modern/crash-reports/**
            HeadlessMC/**
