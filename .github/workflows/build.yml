name: Build and deploy Pages

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      modpack_tag:
        description: Modpack-Modern semver tag (empty = latest release)
        required: false
        default: ""
      fge_version:
        description: field-guide-export release tag (empty = ci/build.env)
        required: false
        default: ""
      mwe_version:
        description: minecraft-web-export release tag (empty = ci/build.env)
        required: false
        default: ""
      export_warmup_ticks:
        description: Ticks after EMI ready before export (empty = ci/build.env)
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout Field Guide
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Load CI config
        run: bash scripts/ci-load-config.sh

      - name: Checkout Modpack-Modern
        id: modpack
        env:
          MODPACK_TAG: ${{ github.event.inputs.modpack_tag }}
        run: bash scripts/ci-checkout-modpack.sh

      - name: Log versions
        run: |
          echo "Modpack-Modern @ ${{ steps.modpack.outputs.modpack_tag }}"
          echo "FGE ${FGE_VERSION} / MWE ${MWE_VERSION}"

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Install xvfb + OpenGL + OpenAL Soft
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xvfb x11-xserver-utils \
            libgl1 libgl1-mesa-dri \
            libopenal1

      - name: Restore pakku-fetched mods
        id: pakku-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            Modpack-Modern/mods
            Modpack-Modern/resourcepacks
            Modpack-Modern/shaderpacks
          key: pakku-${{ hashFiles('Modpack-Modern/pakku-lock.json') }}
          restore-keys: |
            pakku-

      - name: Fetch modpack mods (pakku)
        if: steps.pakku-restore.outputs.cache-hit != 'true'
        working-directory: ${{ env.MODPACK_DIR }}
        run: java -jar pakku.jar fetch

      - name: Save pakku cache
        if: success() && steps.pakku-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            Modpack-Modern/mods
            Modpack-Modern/resourcepacks
            Modpack-Modern/shaderpacks
          key: ${{ steps.pakku-restore.outputs.cache-primary-key }}

      - name: Install field-guide-export
        env:
          FGE_TAG: ${{ github.event.inputs.fge_version || env.FGE_VERSION }}
        run: bash scripts/ci-install-fge.sh

      - name: Install minecraft-web-export
        env:
          MWE_TAG: ${{ github.event.inputs.mwe_version || env.MWE_VERSION }}
        run: bash scripts/ci-install-mwe.sh

      - name: Restore HeadlessMC .minecraft
        id: hmc-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.RUNNER_HOME }}/.minecraft
          key: hmc-${{ env.MC_VERSION }}-forge-${{ env.FORGE_BUILD }}
          restore-keys: |
            hmc-${{ env.MC_VERSION }}-forge-
            hmc-${{ env.MC_VERSION }}-

      - name: Restore emi-export world save
        id: world-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.MODPACK_DIR }}/saves/emi-export
          key: emi-export-${{ env.MC_VERSION }}-${{ hashFiles(format('{0}/pakku-lock.json', env.MODPACK_DIR)) }}
          restore-keys: |
            emi-export-${{ env.MC_VERSION }}-

      - name: Setup HeadlessMC
        run: bash scripts/ci-setup-hmc.sh

      - name: Launch modpack and export
        env:
          ALSOFT_DRIVERS: "null"
          EXPORT_WARMUP: ${{ github.event.inputs.export_warmup_ticks || env.EXPORT_WARMUP_TICKS }}
          MWE_JVM_FLAGS: >-
            -Xmx12G
            -Xms4G
            -XX:+UseG1GC
            -Djava.awt.headless=false
            -Dmodernfix.config.mixin.feature.integrated_server_watchdog=false
            -DminecraftWebExport.export.enabled=true
            -DminecraftWebExport.runExportAndExit=true
            -DminecraftWebExport.export.outputDir=${{ env.EXPORT_ROOT }}
            -DminecraftWebExport.exportMode=scoped
            -DminecraftWebExport.exportWorldName=emi-export
            -DminecraftWebExport.exportWarmupTicks=${{ env.EXPORT_WARMUP }}
            -DminecraftWebExport.exportWorldDelayTicks=${{ env.EXPORT_WORLD_DELAY_TICKS }}
            -DminecraftWebExport.exportTimeoutSeconds=${{ env.EXPORT_TIMEOUT_SECONDS }}
            -Dfieldguide.exportMode=${{ env.FIELDGUIDE_EXPORT_MODE }}
        run: bash scripts/ci-launch-mc-export.sh

      - name: Save emi-export world cache
        if: success() && steps.world-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.MODPACK_DIR }}/saves/emi-export
          key: ${{ steps.world-restore.outputs.cache-primary-key }}

      - name: Save HeadlessMC .minecraft
        if: success() && steps.hmc-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.RUNNER_HOME }}/.minecraft
          key: ${{ steps.hmc-restore.outputs.cache-primary-key }}

      - name: Grant execute permission for Gradlew
        run: chmod +x gradlew

      - name: Build static site
        run: bash scripts/ci-build-site.sh

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ env.SITE_OUTPUT_DIR }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
