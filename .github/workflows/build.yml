name: Build Project

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "build"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
        with:
          submodules: true
          fetch-depth: 1

      - name: Checkout Modpack-Modern at latest release tag
        id: modpack-release
        run: bash scripts/checkout-modpack-latest-release.sh

      - name: Log modpack version
        run: echo "Modpack-Modern @ ${{ steps.modpack-release.outputs.modpack_tag }}"

      - name: Setup Java
        uses: actions/setup-java@v5.0.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5.0.0
        with:
          cache-cleanup: always
          cache-disabled: true

      - name: Grant Execute Permission For Gradlew
        run: chmod +x gradlew

      - name: Fetch mods
        run: |
          cd Modpack-Modern
          java -jar pakku.jar fetch

      - name: Build CLI jar
        run: ./gradlew clean :cli:jar --no-daemon

      - name: Build Website
        run: |
          rm -rf output
          CLI_JAR=$(ls -t cli/build/libs/field-guide-tfg-*.jar cli/build/libs/field-guide-*.jar 2>/dev/null | head -1)
          if [ -z "$CLI_JAR" ]; then
            echo "CLI jar not found under cli/build/libs/"
            exit 1
          fi
          java -jar "$CLI_JAR" -i Modpack-Modern -o output

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'output'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
