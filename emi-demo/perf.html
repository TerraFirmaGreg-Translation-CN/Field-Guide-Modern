<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>emi.js Perf — all recipes (lazy)</title>
  <link rel="stylesheet" href="emi.css">
  <link rel="stylesheet" href="emi-demo.css">
  <link rel="stylesheet" href="perf.css">
</head>
<body class="perf-page">
  <header class="perf-header">
    <nav class="demo-nav">
      <a href="index.html">Review</a>
      <a href="perf.html" aria-current="page">Perf (lazy)</a>
    </nav>
    <h1>全配方列表 · 懒加载</h1>
    <label for="base-url">Export root</label>
    <input id="base-url" type="text" value="export">
    <input id="filter-input" type="search" placeholder="Filter recipe id or category…" autocomplete="off">
    <button type="button" id="btn-rebuild">重建列表</button>
    <button type="button" id="btn-flush">立即挂载剩余</button>
    <span id="perf-stats" class="perf-stats"></span>
  </header>
  <main id="perf-grid" class="perf-grid"></main>
  <div id="tooltip"></div>
  <div id="tag-popover" class="tag-popover" hidden>
    <div class="tag-popover-panel" role="dialog" aria-modal="true">
      <div class="tag-popover-header"></div>
      <div class="tag-popover-stage-wrap"></div>
      <div class="tag-popover-footer"></div>
    </div>
  </div>
  <script src="emi.js"></script>
  <script src="perf-app.js"></script>
</body>
</html>
