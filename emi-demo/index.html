<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>emi.js Demo — Field Guide</title>
  <link rel="stylesheet" href="emi.css">
  <link rel="stylesheet" href="emi-demo.css">
</head>
<body>
  <header>
    <nav class="demo-nav">
      <a href="index.html" aria-current="page">Review</a>
      <a href="perf.html">Perf (lazy)</a>
    </nav>
    <h1>emi.js Demo</h1>
    <label for="base-url">Export root path</label>
    <input id="base-url" type="text" value="export" title="Path to guide-export (must contain generated/)">
    <span id="status"></span>
  </header>
  <main>
    <aside id="list-pane">
      <div id="filter">
        <input id="filter-input" type="search" placeholder="Filter by recipe id or category…" autocomplete="off">
      </div>
      <div id="list-meta"></div>
      <ul id="recipe-list"></ul>
    </aside>
    <section id="detail-pane">
      <p id="detail-empty">Select a recipe from the list</p>
      <p id="detail-title"></p>
      <div id="recipe-view"></div>
    </section>
  </main>
  <div id="tooltip"></div>
  <div id="tag-popover" class="tag-popover" hidden>
    <div class="tag-popover-panel" role="dialog" aria-modal="true">
      <div class="tag-popover-header"></div>
      <div class="tag-popover-stage-wrap"></div>
      <div class="tag-popover-footer"></div>
    </div>
  </div>
  <script src="emi.js"></script>
  <script src="demo-app.js"></script>
</body>
</html>
