# Copied to Modpack-Modern/config/forge-client.toml before headless CI launch.
# Values mirror a normal Forge 47.x client config, with overrides marked (CI).
# Forge fills any future new keys from defaults on first load.

# Client only settings, mostly things related to rendering
[client]
	#Enable Forge to queue all chunk updates to the Chunk Update thread.
	#May increase FPS significantly, but may also cause weird rendering lag.
	#Not recommended for computers without a significant number of cores available.
	alwaysSetupTerrainOffThread = false
	#EXPERIMENTAL: Enable the Forge block rendering pipeline - fixes the lighting of custom models.
	experimentalForgeLightPipelineEnabled = false
	# (CI) Headless: no one can click "Continue" on warnings-only LoadingErrorScreen.
	showLoadWarnings = false
	#Set to true to use a combined DEPTH_STENCIL attachment instead of two separate ones.
	useCombinedDepthStencilAttachment = false
	#[DEPRECATED] Does nothing anymore, IPv6 addresses will be compressed always
	compressLanIPv6Addresses = true
	#During block model baking, manually calculates the normal for all faces.
	calculateAllNormals = false
	#When enabled, a slightly biased Direction#getNearest calculation will be used to prevent normal fighting on 45 degree angle faces.
	stabilizeDirectionGetNearest = true
	# (CI) Some mod textures are tiny; lowering mipmaps avoids hard failures on atlas build.
	allowMipmapLowering = true
